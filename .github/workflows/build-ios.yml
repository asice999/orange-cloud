name: Build iOS (Unsigned IPA)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build variant'
        required: true
        type: choice
        default: 'selfsigned-lite'
        options:
          - full
          - selfsigned-lite
  push:
    branches: [main, master]
    paths:
      - 'apps/ios/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Resolve Package Dependencies
        working-directory: apps/ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "Orange Cloud/Orange Cloud.xcodeproj" \
            -scheme "Orange Cloud"

      - name: Set Build Number
        id: build_number
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "build_number=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Build (Full)
        if: ${{ github.event.inputs.build_type == 'full' || github.event.inputs.build_type == '' && github.ref == 'refs/heads/main' }}
        working-directory: apps/ios
        run: |
          xcodebuild build \
            -project "Orange Cloud/Orange Cloud.xcodeproj" \
            -scheme "Orange Cloud" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CURRENT_PROJECT_VERSION=${{ steps.build_number.outputs.build_number }}

          # Create IPA from .app
          APP_PATH=$(find DerivedData/Build/Products/Release-iphoneos -name "*.app" -type d | head -1)
          echo "App path: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r "OrangeCloud-${{ steps.build_number.outputs.short_sha }}-full.ipa" Payload
          rm -rf Payload

          echo "IPA created: OrangeCloud-${{ steps.build_number.outputs.short_sha }}-full.ipa"
          ls -la OrangeCloud-*.ipa

      - name: Build (Self-signed Lite — no Widget extension)
        if: ${{ github.event.inputs.build_type == 'selfsigned-lite' || github.event.inputs.build_type == '' && github.ref != 'refs/heads/main' }}
        working-directory: apps/ios
        run: |
          # Temporarily remove Widget extension target dependency for self-signed builds
          # Self-signed certs often can't sign app extensions
          xcodebuild build \
            -project "Orange Cloud/Orange Cloud.xcodeproj" \
            -scheme "Orange Cloud" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CURRENT_PROJECT_VERSION=${{ steps.build_number.outputs.build_number }} \
            ONLY_ACTIVE_ARCH=NO

          APP_PATH=$(find DerivedData/Build/Products/Release-iphoneos -name "*.app" -type d | head -1)
          echo "App path: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r "OrangeCloud-${{ steps.build_number.outputs.short_sha }}-selfsigned-lite.ipa" Payload
          rm -rf Payload

          echo "IPA created: OrangeCloud-${{ steps.build_number.outputs.short_sha }}-selfsigned-lite.ipa"
          ls -la OrangeCloud-*.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrangeCloud-unsigned-${{ steps.build_number.outputs.short_sha }}
          path: apps/ios/OrangeCloud-*.ipa
          retention-days: 7
          compression-level: 0
